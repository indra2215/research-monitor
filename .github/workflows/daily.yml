name: Crystal Research Monitor + Deploy

on:
  schedule:
    - cron: '30 5 * * *' # Runs daily at 11:00 AM IST (5:30 UTC)
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests feedparser

      - name: Run Monitor Script
        env:
          TELEGRAMTOKEN: ${{ secrets.TELEGRAMTOKEN }}
          CHARTID: ${{ secrets.CHARTID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SPRINGER_API_KEY: ${{ secrets.SPRINGER_API_KEY }}
        run: python monitor.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json report_data.json index.html
          git commit -m "Update research data [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
